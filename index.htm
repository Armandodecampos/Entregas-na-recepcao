<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Entregas na Recepção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: #1f2937;
            padding: 24px;
            border: 1px solid #4b5563;
            width: 90%;
            max-width: 500px;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 90dvh;
            overflow-y: auto;
        }
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app-height {
            height: calc(100dvh - 180px);
        }

        .item-row:hover {
            transform: translateY(-1px);
        }

    </style>
</head>
<body class="bg-gray-900 text-gray-300 min-h-[100dvh]">

    <div id="access-control-title" class="fixed top-0 left-0 w-full p-6 text-center bg-gray-900 z-50">
        <h1 class="text-3xl font-bold text-gray-100 break-words">Gestão de Encomendas - Recepção</h1>
    </div>

    <!-- Notificações -->
    <div id="toast" class="fixed bottom-5 right-5 z-[2000] hidden text-white px-6 py-3 rounded-lg shadow-2xl transition-all"></div>

    <!-- Auth UI -->

        <div class="w-full max-w-sm bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
            <h2 class="text-2xl font-bold text-center text-white mb-6" id="form-title">Login</h2>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" placeholder="Email" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="Senha" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition">Entrar</button>
            </form>
            <button id="toggle-auth" class="w-full mt-4 text-sm text-blue-400 hover:underline text-center block">Não tem conta? Registe-se</button>
        </div>
    </div>

    <!-- App UI -->
    <div id="main-app" class="hidden flex flex-col h-[100dvh] overflow-hidden">
        <header class="bg-gray-800 p-4 shadow-md flex flex-wrap justify-between items-center px-4 lg:px-12 z-10 border-b border-gray-700 gap-y-3">
            <div class="flex items-center space-x-4 min-w-0 flex-1">
                <h2 id="current-view-title" class="text-xl font-bold text-white truncate break-all">Encomendas</h2>
            </div>
            
            <div class="flex items-center space-x-2 flex-shrink-0">
                <button id="btn-new-item" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg font-medium transition text-sm sm:text-base">

        <div class="bg-gray-900 p-4 px-6 lg:px-12">
            <div class="relative max-w-2xl mx-auto flex flex-col gap-4">
                <div class="relative flex-grow">
                    <i class="fas fa-search absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="text" id="search-input" placeholder="Pesquisar..." class="w-full pl-12 pr-12 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none shadow-inner">
                    <button id="clear-search" class="hidden absolute right-4 top-3.5 bg-red-600 text-white w-7 h-7 rounded-full flex items-center justify-center hover:bg-red-700 transition shadow-lg">

                    <button id="filter-all" onclick="setFilter('all')" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-blue-600 text-white border border-blue-500 shadow-lg whitespace-nowrap">Todos</button>
                    <button id="filter-delivered" onclick="setFilter('delivered')" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-gray-800 text-gray-400 border border-gray-700 hover:bg-gray-700 whitespace-nowrap">Entregados</button>

        <main id="content-grid" class="flex-grow p-4 lg:px-12 overflow-y-auto custom-scrollbar space-y-3 app-height"></main>
    </div>

    <!-- Modal Detalhes da Encomenda -->
    <div id="detail-modal" class="modal">
        <div class="modal-content max-w-2xl">
            <div class="flex justify-between items-center mb-4">

                            <div class="bg-amber-900/20 p-4 rounded-lg border border-amber-500/30">

            </div>

    <!-- Modal Encomenda -->
    <div id="item-modal" class="modal">
        <div class="modal-content max-w-lg">
            <div class="flex justify-between items-center mb-4">
                <h3 id="item-modal-title" class="text-xl font-bold text-white">Registar Encomenda</h3>
                <button type="button" onclick="closeModal('item-modal')" class="bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-700 transition shadow-lg"><i class="fas fa-times"></i></button>
            </div>
            <button type="button" id="btn-withdraw" onclick="toggleWithdrawal()" class="hidden w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 rounded-lg transition mb-4">
                <i class="fas fa-check-circle mr-2"></i>Marcar como retirado
            </button>
            <input type="hidden" id="edit-item-id">
            <form id="item-form" class="space-y-4">
                <div class="relative">
                    <input type="text" id="item-recipient" placeholder="Destinatário (Nome)" required autocomplete="off" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500">
                    <div id="recipient-suggestions" class="hidden absolute left-0 right-0 mt-1 bg-gray-800 border border-gray-700 rounded-lg shadow-xl z-50 max-h-48 overflow-y-auto custom-scrollbar"></div>
                </div>
                <input type="text" id="item-desc" placeholder="Descrição (Objeto / NF / Remetente)" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="item-local" placeholder="Status de acompanhamento" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500">
                <div class="grid grid-cols-2 gap-3">
                    <div><input type="date" id="item-date" required class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-white outline-none"></div>
                    <div><input type="time" id="item-time" required class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-white outline-none"></div>
                </div>
                <div class="space-y-2">
                    <div class="flex flex-col sm:flex-row items-center gap-2">
                        <input type="file" id="item-photo" accept="image/*" multiple class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                        <button type="button" onclick="openCamera()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full text-sm font-semibold transition flex-shrink-0">
                            <i class="fas fa-camera mr-2"></i>Tirar Foto
                        </button>
                    </div>
                    <div id="photo-preview-container" class="hidden w-full p-2 bg-gray-800 rounded-lg border border-gray-700">
                        <div id="photo-previews-grid" class="grid grid-cols-3 sm:grid-cols-4 gap-2"></div>
                    </div>
                </div>
                <div id="withdrawal-section" class="hidden space-y-4 border-t border-gray-600 pt-4 mt-4">
                    <div class="bg-gray-700/30 p-3 rounded-lg">
                        <label class="text-xs text-gray-400 uppercase font-bold block mb-1">Nome de quem retirou</label>
                        <input type="text" id="withdraw-name" placeholder="Nome" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs text-gray-400 uppercase font-bold block mb-1">Data da Retirada</label>
                            <input type="date" id="withdraw-date" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-white outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase font-bold block mb-1">Hora da Retirada</label>
                            <input type="time" id="withdraw-time" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-white outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="submit" id="save-item-btn" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold transition">Guardar</button>
                    <button type="button" onclick="closeModal('item-modal')" class="flex-1 bg-gray-600 text-gray-200 py-2 rounded-lg hover:bg-gray-500 transition">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Camera -->
    <div id="camera-modal" class="modal">
        <div class="modal-content max-w-[450px] p-0 overflow-hidden relative">
            <video id="camera-video" autoplay playsinline class="w-full aspect-square object-cover bg-black"></video>
            <div class="absolute bottom-6 left-0 w-full flex justify-center space-x-4">
                <button onclick="takePhoto()" class="bg-white text-gray-900 w-16 h-16 rounded-full flex items-center justify-center shadow-lg hover:bg-gray-200 transition">
                    <i class="fas fa-camera text-2xl"></i>
                </button>
                <button onclick="stopCamera()" class="bg-red-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg hover:bg-red-700 transition">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
        </div>
    </div>



    <!-- Modal Foto Expandida -->
    <div id="photo-modal" class="modal !z-[2000]" onclick="closeModal('photo-modal')">
        <div class="relative w-full h-full flex items-center justify-center pointer-events-none">
            <button onclick="event.stopPropagation(); closeModal('photo-modal')" class="absolute top-6 right-6 bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-700 transition shadow-lg z-[2001] pointer-events-auto">
                <i class="fas fa-times text-xl"></i>
            </button>
            <img id="expanded-photo" src="" class="w-full h-full object-contain shadow-2xl pointer-events-auto">
        </div>
    </div>

    <!-- Modal Confirmação -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content text-center relative">
            <button onclick="closeModal('confirm-modal')" class="absolute top-4 right-4 bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-700 transition shadow-lg"><i class="fas fa-times"></i></button>
            <div class="text-red-500 text-4xl mb-4"><i class="fas fa-exclamation-triangle"></i></div>
            <h3 class="text-xl font-bold text-white mb-2">Confirmar Exclusão</h3>
            <p id="confirm-message" class="text-gray-400 mb-6 break-all">Deseja realmente excluir este registo?</p>
            <div class="flex space-x-3">
                <button id="confirm-yes" class="flex-1 bg-red-600 text-white py-2 rounded-lg font-bold hover:bg-red-700 transition">Excluir</button>
                <button id="confirm-no" class="flex-1 bg-gray-600 text-gray-200 py-2 rounded-lg hover:bg-gray-500 transition">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const supabaseUrl = 'https://bibnyqqswtkctvmckszk.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpYm55cXFzd3RrY3R2bWNrc3prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk3OTksImV4cCI6MjA5MTA0NTc5OX0.o84IjeaNLKfEWMFaoJ8dI0mChExh-0Z_UIBLIRThBwk';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        let viewMode = 'all-items';
        let deleteAction = null;
        let allFolders = [];
        let currentPhotos = []; // Array de { file: File, url: string, preview: string }
        let cameraStream = null;
        let currentFilter = 'all';

        window.setFilter = (filter) => {
            currentFilter = filter;

            // Atualizar estilos dos botões
            const buttons = {
                'all': document.getElementById('filter-all'),
                'delivered': document.getElementById('filter-delivered'),
                'pending': document.getElementById('filter-pending')
            };

            Object.keys(buttons).forEach(key => {
                const btn = buttons[key];
                if (key === filter) {
                    btn.classList.replace('bg-gray-800', 'bg-blue-600');
                    btn.classList.replace('text-gray-400', 'text-white');
                    btn.classList.replace('border-gray-700', 'border-blue-500');
                    btn.classList.add('shadow-lg');
                } else {
                    btn.classList.replace('bg-blue-600', 'bg-gray-800');
                    btn.classList.replace('text-white', 'text-gray-400');
                    btn.classList.replace('border-blue-500', 'border-gray-700');
                    btn.classList.remove('shadow-lg');
                }
            });

            filterContent();
        };

        function normalizeString(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        window.parseAnexoUrl = (url) => {
            if (!url) return [];
            try {
                const parsed = JSON.parse(url);
                return Array.isArray(parsed) ? parsed : [url];
            } catch (e) {
                return [url];
            }
        }

        function getLocalISODateTime() {
            const now = new Date();
            const date = now.toLocaleDateString('sv-SE'); 
            const time = now.toLocaleTimeString('sv-SE', { hour12: false });
            return { date, time };
        }

        window.toggleWithdrawal = () => {
            const section = document.getElementById('withdrawal-section');
            const btn = document.getElementById('btn-withdraw');
            if (section.classList.contains('hidden')) {
                section.classList.remove('hidden');
                btn.innerHTML = '<i class="fas fa-undo mr-2"></i>Desmarcar como retirado';
                document.getElementById('withdraw-name').value = document.getElementById('item-recipient').value;
                const { date, time } = getLocalISODateTime();
                document.getElementById('withdraw-date').value = date;
                document.getElementById('withdraw-time').value = time.substring(0, 5);
            } else {
                section.classList.add('hidden');
                btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Marcar como retirado';
            }
        };

        function showMessage(msg, type = 'blue') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `fixed bottom-5 right-5 z-[2000] block bg-${type === 'green' ? 'emerald' : type === 'red' ? 'red' : 'blue'}-600 text-white px-6 py-3 rounded-lg shadow-2xl break-words max-w-xs`;
            setTimeout(() => { toast.classList.replace('block', 'hidden'); }, 3000);
        }

        window.openCamera = async () => {
            const modal = document.getElementById('camera-modal');
            const video = document.getElementById('camera-video');
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = cameraStream;
                modal.style.display = 'flex';
            } catch (err) {
                showMessage("Erro ao aceder à câmara: " + err.message, "red");
            }
        };

        window.stopCamera = () => {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            document.getElementById('camera-modal').style.display = 'none';
        };

        window.renderPhotoPreviews = () => {
            const container = document.getElementById('photo-preview-container');
            const grid = document.getElementById('photo-previews-grid');
            grid.innerHTML = '';

            if (currentPhotos.length === 0) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            currentPhotos.forEach((photo, index) => {
                if (photo.file && !photo.preview) {
                    photo.preview = URL.createObjectURL(photo.file);
                }
                const src = photo.preview || photo.url;
                const div = document.createElement('div');
                div.className = 'relative aspect-square bg-gray-700 rounded-lg overflow-hidden border border-gray-600';
                div.innerHTML = `
                    <img src="${src}" class="w-full h-full object-cover">
                    <button type="button" onclick="removePhoto(${index})" class="absolute top-1 right-1 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs shadow-lg hover:bg-red-700">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                grid.appendChild(div);
            });
        };

        window.removePhoto = (index) => {
            const photo = currentPhotos[index];
            if (photo.preview) URL.revokeObjectURL(photo.preview);
            currentPhotos.splice(index, 1);
            renderPhotoPreviews();
        };

        window.takePhoto = () => {
            const video = document.getElementById('camera-video');
            const canvas = document.createElement('canvas');
            const size = Math.min(video.videoWidth, video.videoHeight);
            const sx = (video.videoWidth - size) / 2;
            const sy = (video.videoHeight - size) / 2;

            canvas.width = 1200;
            canvas.height = 1200;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, sx, sy, size, size, 0, 0, 1200, 1200);

            canvas.toBlob((blob) => {
                const file = new File([blob], `camera_${Date.now()}.jpg`, { type: "image/jpeg" });
                currentPhotos.push({ file });
                renderPhotoPreviews();
                stopCamera();
            }, 'image/jpeg', 0.9);
        };

        document.getElementById('item-photo').onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                currentPhotos.push({ file });
            });
            renderPhotoPreviews();
            e.target.value = ''; // Reset to allow same file selection
        };

        function customConfirm(message, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            document.getElementById('confirm-message').textContent = message;
            modal.style.display = 'flex';
            deleteAction = onConfirm;
        }

        document.getElementById('confirm-yes').onclick = () => {
            if (deleteAction) deleteAction();
            closeModal('confirm-modal');
        };

        document.getElementById('confirm-no').onclick = () => closeModal('confirm-modal');
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        window.expandPhoto = (url) => {
            if (!url) return;
            document.getElementById('expanded-photo').src = url;
            document.getElementById('photo-modal').style.display = 'flex';
        };

        window.showItemDetails = async (id) => {
            const { data: item, error } = await supabase.from('achados').select('*').eq('id', id).single();
            if (error) return showMessage("Erro ao abrir detalhes", "red");
            const photoContainer = document.getElementById('detail-photo-container');
            const photos = parseAnexoUrl(item.anexo_url);

            if (photos.length > 0) {
                photoContainer.innerHTML = photos.map(url =>
                    `<img src="${url}" onclick="expandPhoto('${url}')" class="h-full w-auto object-contain bg-black flex-shrink-0 rounded-lg border border-gray-700 cursor-pointer hover:opacity-90 active:opacity-70 transition touch-manipulation">`
                ).join('');
            } else {
                photoContainer.innerHTML = `<div class="w-full text-center text-gray-500"><i class="fas fa-box-open text-6xl mb-2"></i><br>Sem foto</div>`;
            }

            const folder = allFolders.find(f => f.id === item.pasta_id);
            document.getElementById('detail-recipient').textContent = folder ? folder.nome : 'N/A';

            const dateObj = new Date(item.data_encontrado);
            document.getElementById('detail-desc').textContent = item.descricao;
            document.getElementById('detail-local').textContent = item.local_encontrado;
            document.getElementById('detail-date').textContent = dateObj.toLocaleDateString('pt-PT', { day: '2-digit', month: 'long', year: 'numeric' });
            document.getElementById('detail-time').textContent = dateObj.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });

            const withdrawInfo = document.getElementById('detail-withdrawal-info');
            if (item.retirado_por) {
                document.getElementById('detail-withdraw-name').textContent = item.retirado_por;
                const withdrawDt = new Date(item.data_retirada);
                document.getElementById('detail-withdraw-datetime').textContent = `${withdrawDt.toLocaleDateString('pt-PT')} às ${withdrawDt.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })}`;
                withdrawInfo.classList.remove('hidden');
            } else {
                withdrawInfo.classList.add('hidden');
            }

            document.getElementById('detail-modal').style.display = 'flex';
        };


        window.editItem = async (id) => {
            const { data: item, error } = await supabase.from('achados').select('*').eq('id', id).single();
            if (error) return showMessage("Erro ao carregar dados", "red");
            document.getElementById('item-modal-title').textContent = "Editar Encomenda";
            document.getElementById('edit-item-id').value = id;

            const folder = allFolders.find(f => f.id === item.pasta_id);
            document.getElementById('item-recipient').value = folder ? folder.nome : '';

            document.getElementById('item-desc').value = item.descricao;
            document.getElementById('item-local').value = item.local_encontrado;
            if (item.data_encontrado) {
                const dt = new Date(item.data_encontrado);
                document.getElementById('item-date').value = dt.toLocaleDateString('sv-SE');
                document.getElementById('item-time').value = dt.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
            }

            const btnWithdraw = document.getElementById('btn-withdraw');
            btnWithdraw.classList.remove('hidden');
            const withdrawSection = document.getElementById('withdrawal-section');
            if (item.retirado_por) {
                btnWithdraw.innerHTML = '<i class="fas fa-undo mr-2"></i>Desmarcar como retirado';
                document.getElementById('withdraw-name').value = item.retirado_por;
                const rdt = new Date(item.data_retirada);
                document.getElementById('withdraw-date').value = rdt.toLocaleDateString('sv-SE');
                document.getElementById('withdraw-time').value = rdt.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
                withdrawSection.classList.remove('hidden');
            } else {
                btnWithdraw.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Marcar como retirado';
                document.getElementById('withdraw-name').value = '';
                withdrawSection.classList.add('hidden');
            }

            currentPhotos = parseAnexoUrl(item.anexo_url).map(url => ({ url }));
            renderPhotoPreviews();
            document.getElementById('item-modal').style.display = 'flex';
        };

        window.deleteItem = (id) => {
            customConfirm("Remover este registo permanentemente?", async () => {
                const { error } = await supabase.from('achados').delete().eq('id', id);
                if (error) showMessage("Erro: " + error.message, 'red');
                else {
                    showMessage("Eliminado!", 'green');
                    renderAllItems();
                }
            });
        };

        async function fetchFolders() {
            const { data, error } = await supabase.from('pastas').select('*');
            if (!error) allFolders = data || [];
        }

        window.selectRecipient = (nome) => {
            document.getElementById('item-recipient').value = nome;
            document.getElementById('recipient-suggestions').classList.add('hidden');
        };

        function updateRecipientSuggestions() {
            const input = document.getElementById('item-recipient');
            const container = document.getElementById('recipient-suggestions');
            const term = normalizeString(input.value);

            if (!term) {
                container.classList.add('hidden');
                return;
            }

            const matches = allFolders.filter(f => normalizeString(f.nome).includes(term))
                .sort((a, b) => a.nome.localeCompare(b.nome))
                .slice(0, 5);

            if (matches.length > 0) {
                container.innerHTML = matches.map(f => `
                    <div onclick="selectRecipient('${f.nome}')" class="px-4 py-2 hover:bg-gray-700 cursor-pointer text-white border-b border-gray-700 last:border-0 transition">
                        ${f.nome}
                    </div>
                `).join('');
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#item-recipient') && !e.target.closest('#recipient-suggestions')) {
                document.getElementById('recipient-suggestions').classList.add('hidden');
            }
        });

        function setView() {
            const content = document.getElementById('content-grid');
            const title = document.getElementById('current-view-title');
            document.getElementById('search-input').value = '';
            document.getElementById('clear-search').classList.add('hidden');
            content.innerHTML = '';
            title.textContent = "Encomendas";
            renderAllItems();
            fetchFolders();
        }


        async function renderAllItems() {
            const container = document.getElementById('content-grid');
            const { data: items } = await supabase.from('achados').select('*').order('data_encontrado', { ascending: false });
            const { data: folders } = await supabase.from('pastas').select('id, nome');

            const folderMap = {};
            folders?.forEach(f => folderMap[f.id] = f.nome);

            container.innerHTML = items?.length === 0 ? '<div class="text-center text-gray-500 py-20">Nenhuma encomenda registada.</div>' : '';
            items?.forEach(item => {
                const row = document.createElement('div');
                const displayDate = new Date(item.data_encontrado).toLocaleString('pt-PT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                const isWithdrawn = !!item.retirado_por;
                const photos = parseAnexoUrl(item.anexo_url);

                let photoContent = `<i class="fas fa-box text-gray-500 text-xl"></i>`;
                if (photos.length > 0) {
                    photoContent = `<img src="${photos[0]}" class="w-full h-full object-cover">`;
                }

                row.className = `flex flex-col md:flex-row md:items-center justify-between p-4 ${isWithdrawn ? 'bg-amber-900/40 border-amber-500/50' : 'bg-gray-800 border-gray-700'} rounded-xl shadow-md w-full max-w-5xl mx-auto space-y-4 md:space-y-0 cursor-pointer hover:border-blue-500/50 transition item-row`;
                row.dataset.withdrawn = isWithdrawn;
                row.onclick = () => window.showItemDetails(item.id);
                const photoOnclick = '';
                row.innerHTML = `
                    <div class="flex items-center space-x-4 min-w-0 flex-1">
                        <div ${photoOnclick} class="w-14 h-14 sm:w-16 sm:h-16 rounded-lg bg-gray-700 flex-shrink-0 overflow-hidden border border-gray-600 flex items-center justify-center relative">
                            ${photoContent}
                        </div>
                        <div class="min-w-0 flex-1">
                            <h4 class="text-white font-bold text-base sm:text-lg break-all">${item.descricao}</h4>
                            <div class="flex flex-wrap gap-x-4 text-xs sm:text-sm text-gray-400">
                                <span class="break-all text-emerald-400 font-medium"><i class="fas fa-user-circle mr-1"></i>${folderMap[item.pasta_id] || 'N/A'}</span>
                                <span class="break-all"><i class="fas fa-truck mr-1 text-blue-500"></i>${item.local_encontrado}</span>
                                <span><i class="fas fa-clock mr-1 text-gray-500"></i>${displayDate}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 justify-end flex-shrink-0" onclick="event.stopPropagation()">
                        <button onclick="window.editItem('${item.id}')" class="p-2 sm:p-3 bg-gray-700/50 rounded-lg hover:text-blue-400"><i class="fas fa-pencil-alt"></i></button>
                        <button onclick="window.deleteItem('${item.id}')" class="p-2 sm:p-3 bg-gray-700/50 rounded-lg hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
                container.appendChild(row);
            });
            filterContent();
        }


        async function uploadPhoto(file) {
            const fileName = `${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const { error } = await supabase.storage.from('fotos').upload(fileName, file);
            if (error) throw error;
            const { data: { publicUrl } } = supabase.storage.from('fotos').getPublicUrl(fileName);
            return publicUrl;
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isSignUp = document.getElementById('toggle-auth').textContent.includes('Login');
            const { error } = isSignUp ? await supabase.auth.signUp({ email, password }) : await supabase.auth.signInWithPassword({ email, password });
            if (error) showMessage(error.message, 'red');
        };

        supabase.auth.onAuthStateChange((evt, session) => {
            document.getElementById('auth-container').style.display = session ? 'none' : 'flex';
            document.getElementById('access-control-title').style.display = session ? 'none' : 'block';
            document.getElementById('main-app').classList.toggle('hidden', !session);
            if (session && (evt === 'SIGNED_IN' || evt === 'INITIAL_SESSION')) setView();
        });

        document.getElementById('btn-logout').onclick = () => supabase.auth.signOut();

        document.getElementById('btn-new-item').onclick = () => {
            document.getElementById('item-modal-title').textContent = "Registar Encomenda";
            document.getElementById('edit-item-id').value = "";
            document.getElementById('item-form').reset();
            const { date, time } = getLocalISODateTime();
            document.getElementById('item-date').value = date;
            document.getElementById('item-time').value = time.substring(0, 5);

            const btnWithdraw = document.getElementById('btn-withdraw');
            btnWithdraw.classList.add('hidden');
            btnWithdraw.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Marcar como retirado';
            document.getElementById('withdrawal-section').classList.add('hidden');

            currentPhotos.forEach(p => p.preview && URL.revokeObjectURL(p.preview));
            currentPhotos = [];
            renderPhotoPreviews();
            document.getElementById('item-modal').style.display = 'flex';
        };

        document.getElementById('item-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-item-btn');
            const editId = document.getElementById('edit-item-id').value;
            const originalText = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = "A gravar...";
            try {
                const recipientName = document.getElementById('item-recipient').value.trim();
                if (!recipientName) throw new Error("Destinatário é obrigatório");

                let folderId;
                const existingFolder = allFolders.find(f => normalizeString(f.nome) === normalizeString(recipientName));

                if (existingFolder) {
                    folderId = existingFolder.id;
                } else {
                    const { data: newFolder, error: folderError } = await supabase.from('pastas').insert([{ nome: recipientName }]).select().single();
                    if (folderError) throw folderError;
                    folderId = newFolder.id;
                    await fetchFolders(); // Refresh local cache
                }

                const photoUrls = [];
                for (const photo of currentPhotos) {
                    if (photo.file) {
                        const url = await uploadPhoto(photo.file);
                        photoUrls.push(url);
                    } else if (photo.url) {
                        photoUrls.push(photo.url);
                    }
                }

                const dateVal = document.getElementById('item-date').value;
                const timeVal = document.getElementById('item-time').value;
                const payload = {
                    pasta_id: folderId,
                    descricao: document.getElementById('item-desc').value,
                    local_encontrado: document.getElementById('item-local').value,
                    data_encontrado: new Date(`${dateVal}T${timeVal}:00`).toISOString(),
                    anexo_url: photoUrls.length > 0 ? JSON.stringify(photoUrls) : null
                };

                if (!document.getElementById('withdrawal-section').classList.contains('hidden')) {
                    payload.retirado_por = document.getElementById('withdraw-name').value;
                    const rDate = document.getElementById('withdraw-date').value;
                    const rTime = document.getElementById('withdraw-time').value;
                    if (rDate && rTime) {
                        payload.data_retirada = new Date(`${rDate}T${rTime}:00`).toISOString();
                    }
                } else {
                    payload.retirado_por = null;
                    payload.data_retirada = null;
                }
                const { error } = editId ? await supabase.from('achados').update(payload).eq('id', editId) : await supabase.from('achados').insert([payload]);
                if (error) throw error;
                closeModal('item-modal');
                renderAllItems();
                showMessage("Gravado", "green");
            } catch (err) { showMessage(err.message, 'red'); }
            finally { btn.disabled = false; btn.innerHTML = originalText; }
        };

        const searchInput = document.getElementById('search-input');
        const clearSearchBtn = document.getElementById('clear-search');

        function filterContent() {
            const term = normalizeString(searchInput.value);
            clearSearchBtn.classList.toggle('hidden', !searchInput.value);
            document.querySelectorAll('#content-grid > div').forEach(card => {
                const text = normalizeString(card.textContent);
                const matchesSearch = text.includes(term);

                let matchesFilter = true;
                const isWithdrawn = card.dataset.withdrawn === 'true';

                if (currentFilter === 'delivered') {
                    matchesFilter = isWithdrawn;
                } else if (currentFilter === 'pending') {
                    matchesFilter = !isWithdrawn;
                }

                card.style.display = (matchesSearch && matchesFilter) ? 'flex' : 'none';
            });
        }

        searchInput.oninput = filterContent;
        document.getElementById('item-recipient').oninput = updateRecipientSuggestions;

        clearSearchBtn.onclick = () => {
            searchInput.value = '';
            filterContent();
            searchInput.focus();
        };

        document.getElementById('toggle-auth').onclick = () => {
            const btn = document.getElementById('submit-btn');
            const title = document.getElementById('form-title');
            const toggle = document.getElementById('toggle-auth');
            if (title.textContent === 'Login') {
                title.textContent = 'Criar Conta'; btn.textContent = 'Registar'; toggle.textContent = 'Já tem conta? Entrar';
            } else {
                title.textContent = 'Login'; btn.textContent = 'Entrar'; toggle.textContent = 'Não tem conta? Registe-se';
            }
        };

    </script>
</body>
</html>
